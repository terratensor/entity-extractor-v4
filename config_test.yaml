source:
  host: localhost
  port: 9306
  table: library2026
  batch_size: 1

model:
  name: Davlan/xlm-roberta-large-ner-hrl
  max_tokens: 512
  overlap_ratio: 0.0
  min_confidence: 0.5
  include_positions: true

queues:
  queue1_size: 1
  queue2_size: 1
  queue3_size: 1

tokenizer:
  num_workers: 8
  prefetch_size: 200

gpu_devices:
  - device_id: 0
    batch_size: 8
    precision: float16
  - device_id: 1
    batch_size: 6
    precision: float16

output:
  format: csv
  path: ./results_test/output.csv
  delimiter: "|"
  include_confidence: true    
  include_positions: true  # ВАЖНО для расширения
  flush_interval: 30
  buffer_size: 1000

  # [ЭКСПЕРИМЕНТАЛЬНЫЕ ПАРАМЕТРЫ] Расширение слов
  enable_expansion: true
  expansion_params:
    # Минимальная длина токена для расширения
    min_token_length: 2
    
    # Максимальное расстояние поиска влево/вправо
    max_search_left: 30
    max_search_right: 30
    
    # Минимальная доля исходного текста в расширенном (0.3 = 30%)
    min_coverage: 0.5
    
    # Требовать заглавную букву для LOC/PER
    require_capital: true
    
    # Включить проверку на стоп-слова
    enable_stopwords: true
    
    # Включить проверку на слияние
    enable_merge_check: true
    
    # Максимальное соотношение длин (расширенное / исходное)
    max_length_ratio: 5.0
    # Добавим список типичных окончаний (можно вынести в конфиг - зашито в коде)
    common_endings: ['а', 'я', 'ы', 'и', 'е', 'ё', 'ю', 'й']

checkpoint:
  file: ./checkpoint_test.json
  save_interval: 500

logging:
  level: INFO
  file: ./batch_test.log
