source:
  host: localhost
  port: 9306
  table: library2026
  batch_size: 1000

model:
  name: Davlan/xlm-roberta-large-ner-hrl
  max_tokens: 512
  overlap_ratio: 0.0
  min_confidence: 0.5
  include_positions: false

queues:
  queue1_size: 10000
  queue2_size: 1000
  queue3_size: 2000

tokenizer:
  num_workers: 8
  prefetch_size: 200

gpu_devices:
  - device_id: 0
    batch_size: 8
    precision: float16
  - device_id: 1
    batch_size: 6
    precision: float16

output:
  format: csv
  path: ./results_test/output.csv
  delimiter: "|"
  include_confidence: true
  include_positions: false
  flush_interval: 10
  buffer_size: 1000
  include_positions: true  # ВАЖНО для расширения

  # [ЭКСПЕРИМЕНТАЛЬНЫЕ ПАРАМЕТРЫ]
  enable_expansion: true
  expansion_params:
    min_token_length: 2
    enable_stopwords: true
    enable_merge_check: true

checkpoint:
  file: ./checkpoint_test.json
  save_interval: 500

logging:
  level: INFO
  file: ./batch_test.log
