source:
  type: manticore
  host: localhost
  port: 9306
  table: library2026
  batch_size: 10000

model:
  name: Davlan/xlm-roberta-large-ner-hrl
  max_tokens: 512
  overlap_ratio: 0.0
  min_confidence: 0.5
  include_positions: false

queues:
  queue1_size: 5000
  queue2_size: 1000
  queue3_size: 2000

tokenizer:
  num_workers: 8
  prefetch_size: 100

gpu_devices:
  - device_id: 0
    batch_size: 8
    precision: float16
  - device_id: 1
    batch_size: 6
    precision: float16

output:
  format: csv
  path: ./results_v4/output.csv
  delimiter: "|"
  include_confidence: true
  include_positions: true
  flush_interval: 30
  buffer_size: 1000

  # [ЭКСПЕРИМЕНТАЛЬНЫЕ ПАРАМЕТРЫ] Расширение слов
  enable_expansion: true
  expansion_params:
    # Минимальная длина токена для расширения
    min_token_length: 2
    
    # Максимальное расстояние поиска влево/вправо
    max_search_left: 30
    max_search_right: 30
    
    # Минимальная доля исходного текста в расширенном (0.25 = 25%)
    # полное слово: 'Вернувшись' (10 символов)
    # исходное: 'Вер' (3 символа)
    # покрытие = 3 / 10 = 0.3
    # ❌ покрытие 0.30 < 0.5
    # Слишком маленькие куски (1-2 буквы) будут отсекаться другими проверками
    min_coverage: 0.1
    
    # Требовать заглавную букву для LOC/PER
    require_capital: true
    
    # Включить проверку на стоп-слова
    enable_stopwords: false
    
    # Включить проверку на слияние
    enable_merge_check: true
    
    # Максимальное соотношение длин (расширенное / исходное)
    max_length_ratio: 15.0
    # Добавим список типичных окончаний (можно вынести в конфиг - зашито в коде)
    common_endings: ['а', 'я', 'ы', 'и', 'е', 'ё', 'ю', 'й']
    expand_entity_types: ['LOC', 'PER', 'ORG']
    enable_final_cleaning: true 

checkpoint:
  file: ./batch_checkpoint_v4.json
  save_interval: 1000

logging:
  level: INFO
  file: ./batch_processor_v4.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"